<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | ExamFillip</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-accent: #22c55e; /* Neon Green */
            --secondary-accent: #3b82f6; /* Blue */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary-accent);
            color: var(--primary-accent);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid var(--card-bg);
            border-top: 3px solid var(--primary-accent);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: var(--text-dim);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">ExamFillip Ecosystem</div>
        <div class="loader"></div>
        <h1>Coming Soon</h1>
        <p>Something big is brewing for the JEE aspirants. We are currently building the next phase of the <b>Test Builder Pipeline</b>. Stay tuned!</p>
        
        <div class="footer">
            © 2026 ExamFillip. All rights reserved.
        </div>
    </div>

</body>
</html>
